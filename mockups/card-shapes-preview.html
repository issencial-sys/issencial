<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Card Shapes</title>
  <style>
    body { background: #333; display: flex; gap: 40px; padding: 40px; align-items: flex-start; }
    .card { width: 300px; height: 200px; }
    .card img { width: 100%; height: 100%; object-fit: contain; }
    .label { color: white; font-family: sans-serif; font-size: 14px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div>
    <div class="label">Card Cinza</div>
    <div class="card"><img src="public/assets/cards/card cinza.webp" alt="cinza"></div>
  </div>
  <div>
    <div class="label">Card Verde Claro</div>
    <div class="card"><img src="public/assets/cards/card verde claro.webp" alt="verde claro"></div>
  </div>
  <div>
    <div class="label">Card Verde Escuro</div>
    <div class="card"><img src="public/assets/cards/card verde escuro.webp" alt="verde escuro"></div>
  </div>
</body>
</html>
