<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow gradient -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d7de6a" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#d7de6a" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#002e35" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#d7de6a"/>
    </pattern>

    <!-- Radial accent -->
    <radialGradient id="radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d7de6a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#002e35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#002e35"/>

  <!-- Glow overlay -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Radial glow -->
  <circle cx="600" cy="315" r="400" fill="url(#radial)"/>

  <!-- Dot pattern -->
  <g opacity="0.04">
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="280" fill="none" stroke="#d7de6a" stroke-opacity="0.07" stroke-width="1.5"/>
  <circle cx="180" cy="550" r="200" fill="none" stroke="#d7de6a" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="850" cy="480" r="120" fill="none" stroke="#d7de6a" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Subtle accent line -->
  <line x1="400" y1="180" x2="800" y2="180" stroke="#d7de6a" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Logo — principal_branco.png (2084x952, ~2.19:1 aspect ratio) -->
  <image
    href="/logo/principal_branco.png"
    x="350" y="195"
    width="500" height="228"
    preserveAspectRatio="xMidYMid meet"
  />

  <!-- Subtle accent line -->
  <line x1="400" y1="450" x2="800" y2="450" stroke="#d7de6a" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="600" y="490"
    text-anchor="middle"
    fill="#ffffff" fill-opacity="0.45"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="0.02"
  >
    Soluções completas para cada necessidade — sem fronteiras
  </text>

  <!-- URL -->
  <text
    x="600" y="555"
    text-anchor="middle"
    fill="#d7de6a" fill-opacity="0.5"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="2.5"
  >
    ISSENCIAL.PT
  </text>
</svg>
