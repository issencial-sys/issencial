<!DOCTYPE html>
<html lang="pt">
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #002e35;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    .circle-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 1px solid rgba(215, 222, 106, 0.08);
      top: -150px;
      right: -100px;
    }
    .circle-2 {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      border: 1px solid rgba(215, 222, 106, 0.06);
      bottom: -100px;
      left: -80px;
    }
    .circle-3 {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(215, 222, 106, 0.03);
      border: 1px solid rgba(215, 222, 106, 0.04);
      top: 35%;
      right: 12%;
    }

    /* Dot pattern */
    .dots {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: radial-gradient(circle at 50% 50%, #d7de6a 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      width: 220px;
      height: auto;
    }

    h1 {
      color: #ffffff;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.1;
    }

    .tagline {
      color: rgba(255, 255, 255, 0.5);
      font-size: 20px;
      text-align: center;
      max-width: 600px;
      letter-spacing: 0.01em;
    }

    .accent-line {
      width: 40px;
      height: 3px;
      background: #d7de6a;
      border-radius: 2px;
    }

    .badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 100px;
      border: 1px solid rgba(215, 222, 106, 0.2);
      color: #d7de6a;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="dots"></div>
  <div class="circle-1"></div>
  <div class="circle-2"></div>
  <div class="circle-3"></div>

  <div class="content">
    <img class="logo" src="public/logo/principal_branco.png" alt="Issencial" />
    <div class="badge">Serviços Integrados Globais</div>
    <div class="accent-line"></div>
    <p class="tagline">Soluções completas para cada necessidade — sem fronteiras</p>
  </div>
</body>
</html>
